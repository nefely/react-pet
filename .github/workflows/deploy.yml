name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-projects:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - anime-list
          - dating-quiz
          - e-shop
          - news-blog
          - quiz-self-try
          - redux-try
          - simple-training
          - task-manager
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.project }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.project }}

      - name: Upload dist artifact
        if: ${{ matrix.project == 'task-manager' || matrix.project == 'quiz-self-try' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-dist
          path: ${{ matrix.project }}/dist

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-projects
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: task-manager-dist
          path: deploy/task-manager

      - uses: actions/download-artifact@v4
        with:
          name: quiz-self-try-dist
          path: deploy/quiz-self-try

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
